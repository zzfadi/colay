name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  swift-build:
    name: swift build (macOS 14)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build (debug)
        run: swift build -v

      - name: Build (release)
        run: swift build -c release
