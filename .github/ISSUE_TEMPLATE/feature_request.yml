name: Feature request
description: Suggest a new behavior, command, or capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that the current commands don't let you do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed shape
      description: A sketch of the new command / behavior. Schema example is great.
      render: text
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
