name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: If you have a script JSON that triggers it, paste it here.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs. actual
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: 14.4
    validations:
      required: true
  - type: input
    id: swift
    attributes:
      label: Swift / Xcode version
      placeholder: Swift 5.9 / Xcode 15.3
  - type: input
    id: commit
    attributes:
      label: colay commit
      description: Output of `git rev-parse --short HEAD`.
  - type: textarea
    id: logs
    attributes:
      label: Relevant log lines
      description: From the dashboard log card or `Console.app`.
      render: text
